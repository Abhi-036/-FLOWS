<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TaskFlows</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    overflow:hidden;
    color:white;
}

/* ===== LANDING SCREEN ===== */
#landing{
    position:relative;
    width:100%;
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    overflow:hidden;
}

/* Responsive PNG Background */
#landing::before{
    content:"";
    position:absolute;
    inset:0;

    background-image:url("./images/vibes.png");
    background-repeat:no-repeat;
    background-position:center center;
    background-size:cover;

    z-index:0;
}

/* Mobile: show full PNG without cropping */
@media (max-width:768px){
    #landing::before{
        background-size:contain;
        background-color:#0f0a08;
    }
}

/* Keep content above background */
#landing > *{
    position:relative;
    z-index:1;
}

/* Logo */
.logo1{
    font-size:50px;
    font-weight:bold;
    color:#f7ead8;
    letter-spacing:2px;
    text-shadow:0 4px 20px rgba(0,0,0,.5);
}

.logo2{
    font-size:42px;
    font-weight:bold;
    color:#a35a07;
    letter-spacing:18px;
    margin-top:5px;
    text-shadow:0 4px 20px rgba(0,0,0,.5);
}

/* Date & Time Card */
.datetime{
    margin-top:25px;
    text-align:center;
    background:rgba(0,0,0,.25);
    backdrop-filter:blur(12px);
    -webkit-backdrop-filter:blur(12px);
    padding:14px 24px;
    border-radius:20px;
    border:1px solid rgba(255,255,255,.15);
}

#date{
    font-size:16px;
    margin-bottom:5px;
}

#time{
    font-size:20px;
    font-weight:bold;
}

/* Swipe Indicator */
.swipe-indicator{
    bottom: -200px;
    text-align:center;
    font-size:32px;
    line-height:0.7;
    color:#79390e3a;
    animation:floatUp 1.5s infinite;
}

@keyframes floatUp{
    0%,100%{
        transform:translateY(0);
        opacity:0.5;
    }
    50%{
        transform:translateY(-12px);
        opacity:1;
    }
}
</style>
</head>

<body>

<div id="landing">

    <div class="logo1">टास्क</div>
    <div class="logo2">FLOWS</div>

    <div class="datetime">
        <div id="date"></div>
        <div id="time"></div>
    </div>

    <div class="swipe-indicator">▔<br>▔▔<br>▔▔▔</div>

</div>

<script>

// Redirect to Home Page
function enterApp(){
    window.location.href = "home.html";
}

// Live Date & Time
function updateDateTime(){

    const now = new Date();

    document.getElementById("date").innerText =
    now.toLocaleDateString("en-US",{
        weekday:"long",
        year:"numeric",
        month:"long",
        day:"numeric"
    });

    document.getElementById("time").innerText =
    now.toLocaleTimeString("en-US",{
        hour:"2-digit",
        minute:"2-digit",
        second:"2-digit"
    });
}

updateDateTime();
setInterval(updateDateTime,1000);

// Swipe Up Redirect
let startY = 0;

document.addEventListener("touchstart",(e)=>{
    startY = e.touches[0].clientY;
});

document.addEventListener("touchend",(e)=>{
    const endY = e.changedTouches[0].clientY;

    if(startY - endY > 80){
        enterApp();
    }
});

// Desktop Click Redirect
document.addEventListener("click",()=>{
    enterApp();
});

</script>

</body>
</html>
